<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--ink:#0A0A0F;--surface:#12121A;--panel:#1A1A26;--border:#2A2A3E;--accent:#6C63FF;--gold:#FFD166;--green:#06D6A0;--rose:#EF476F;--text:#E8E8F0;--muted:#7070A0;}
body{background:var(--ink);font-family:'Outfit',sans-serif;color:var(--text);display:flex;justify-content:center;}
#root{width:100%;max-width:480px;min-height:100vh;}
*::-webkit-scrollbar{display:none;}
input,textarea,select{font-family:'Outfit',sans-serif;outline:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes xpPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}30%{opacity:1;transform:translate(-50%,-65%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-100%) scale(.8)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes slideIn{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes notif{0%{opacity:0;transform:translateX(-50%) translateY(20px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1}100%{opacity:0}}
.screen{padding:20px 16px 100px;animation:fadeUp .3s ease;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:20px;}
.btn{border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-weight:700;border-radius:14px;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;font-size:15px;}
.btn:active{transform:scale(.96);}
.btn-p{background:linear-gradient(135deg,var(--accent),#8B85FF);color:#fff;}
.btn-g{background:linear-gradient(135deg,var(--gold),#FFA500);color:#000;}
.btn-gr{background:linear-gradient(135deg,var(--green),#00B894);color:#000;}
.btn-gh{background:var(--panel);color:var(--text);border:1px solid var(--border);}
.btn-d{background:var(--rose);color:#fff;}
.btn-f{width:100%;}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;}
.inp{background:var(--panel);border:1.5px solid var(--border);border-radius:12px;padding:13px 16px;color:var(--text);font-size:15px;width:100%;transition:border .2s;}
.inp:focus{border-color:var(--accent);}
.inp::placeholder{color:var(--muted);}
.pb{background:var(--border);border-radius:99px;overflow:hidden;}
.pbf{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.34,1.56,.64,1);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.bai{background:var(--panel);border:1px solid var(--border);border-radius:18px 18px 18px 4px;padding:12px 16px;max-width:82%;font-size:14px;line-height:1.65;white-space:pre-wrap;}
.bau{background:linear-gradient(135deg,var(--accent),#8B85FF);border-radius:18px 18px 4px 18px;padding:12px 16px;max-width:82%;font-size:14px;line-height:1.65;color:#fff;}
.or{background:var(--panel);border:2px solid var(--border);border-radius:14px;padding:15px 18px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .2s;margin-bottom:10px;font-weight:600;font-size:15px;}
.at{padding:8px 14px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border:none;background:none;transition:all .2s;}
.at.ac{background:var(--accent);color:#fff;}
.li{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.mo{position:fixed;inset:0;background:#000c;z-index:500;display:flex;align-items:flex-end;justify-content:center;}
.mb{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:24px;max-height:88vh;overflow-y:auto;animation:slideIn .3s ease;}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 16px;z-index:100;}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:6px 12px;border-radius:12px;transition:all .2s;border:none;background:none;}
.ni.ac{background:#6C63FF22;}
.ni span:first-child{font-size:22px;}
.ni span:last-child{font-size:10px;font-weight:600;color:var(--muted);}
.ni.ac span:last-child{color:var(--accent);}
.wc{background:var(--panel);border:2px solid var(--border);border-radius:24px;min-height:240px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:28px;text-align:center;transition:all .35s;margin-bottom:20px;}
.sp{width:20px;height:20px;border:2px solid #fff4;border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
</style>

// ══ DB ══
async function gP(uid){const{data}=await sb.from('profiles').select('*').eq('id',uid).single();return data;}
async function gT(){const{data}=await sb.from('tracks').select('*').eq('is_active',true).order('order_num');return data||[];}
async function gL(tid){const{data}=await sb.from('lessons').select('*').eq('track_id',tid).eq('is_active',true).order('order_num');return data||[];}
async function gPr(uid){const{data}=await sb.from('user_progress').select('lesson_id').eq('user_id',uid);return new Set((data||[]).map(r=>r.lesson_id));}
async function sP(uid,lid){await sb.from('user_progress').upsert({user_id:uid,lesson_id:lid,score:100});}
async function uP(uid,u){await sb.from('profiles').update(u).eq('id',uid);}
async function gAI(){const{data}=await sb.from('ai_settings').select('*').eq('id',1).single();return data||{};}
async function sAI(u){await sb.from('ai_settings').update({...u,updated_at:new Date().toISOString()}).eq('id',1);}

// ══ INIT — بدون splash ══
async function init(){
  rend('auth'); // ابدأ بصفحة التسجيل فوراً
  // بعدين جرب تحمل الـ session في الخلفية
  sb.auth.getSession().then(async({data:{session}})=>{
    if(session?.user){
      S.user=session.user;
      await loadUser(session.user);
    }
  }).catch(()=>{});
  sb.auth.onAuthStateChange(async(e,session)=>{
    if(e==='SIGNED_IN'&&session?.user&&!S.profile){
      S.user=session.user;
      await loadUser(session.user);
    }
    if(e==='SIGNED_OUT'){S.user=null;S.profile=null;rend('auth');}
  });
}

async function loadUser(user){
  try{
    const[prof,trks,prog,ai]=await Promise.all([gP(user.id),gT(),gPr(user.id),gAI()]);
    S.profile=prof;S.tracks=trks;S.progress=prog;S.ai=ai||{};
    S.model=ai?.gemini_key?'gemini':ai?.openai_key?'openai':ai?.grok_key?'grok':'gemini';
    if(!S.profile)return;
    rend('main');
  }catch(e){console.log(e);}
}

// ══ AI ══
async function callAI(prompt,sys){
  const m=S.model,ai=S.ai;
  const sp=sys||ai.system_prompt||'انت مدرس ذكي اسمك Dr. IQ. متخصص في ادارة الاعمال والاقتصاد والعلوم السياسية. اشرح المصطلح: تعريف بالانجليزية، ترجمة عربية، مثال. استخدم ايموجي. رد مختصر.';
  try{
    if(m==='gemini'){
      if(!ai.gemini_key)return'⚠️ أضف مفتاح Gemini من الإعدادات';
      const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+ai.gemini_key,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:sp+'\n\n'+prompt}]}]})});
      const d=await r.json();
      if(d.error)return'❌ Gemini: '+d.error.message;
      return d.candidates?.[0]?.content?.parts?.[0]?.text||'لا يوجد رد.';
    }
    if(m==='openai'){
      if(!ai.openai_key)return'⚠️ أضف مفتاح OpenAI من الإعدادات';
      const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+ai.openai_key},body:JSON.stringify({model:'gpt-4o-mini',max_tokens:1000,messages:[{role:'system',content:sp},{role:'user',content:prompt}]})});
      const d=await r.json();
      if(d.error)return'❌ OpenAI: '+d.error.message;
      return d.choices?.[0]?.message?.content||'لا يوجد رد.';
    }
    if(m==='grok'){
      if(!ai.grok_key)return'⚠️ أضف مفتاح Grok من الإعدادات';
      const r=await fetch('https://api.x.ai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+ai.grok_key},body:JSON.stringify({model:'grok-beta',max_tokens:1000,messages:[{role:'system',content:sp},{role:'user',content:prompt}]})});
      const d=await r.json();
      if(d.error)return'❌ Grok: '+d.error.message;
      return d.choices?.[0]?.message?.content||'لا يوجد رد.';
    }
    if(m==='claude'){
      if(!ai.claude_key)return'⚠️ أضف مفتاح Claude من الإعدادات';
      const r=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude',prompt,system:sp,key:ai.claude_key})});
      const d=await r.json();
      return d.text||'لا يوجد رد.';
    }
  }catch(e){
    // لو Gemini فشل جرب OpenAI
    if(m==='gemini'&&ai.openai_key){S.model='openai';return callAI(prompt,sys);}
    return'⚠️ خطأ في الاتصال. تأكد من المفتاح.';
  }
  return'اختر نموذج AI من الإعدادات.';
}

// ══ RENDER ══
function rend(s){S.screen=s;rr();}
function rr(){
  const a=document.getElementById('app');if(!a)return;a.innerHTML='';
  if(S.screen==='auth'){a.appendChild(authS());return;}
  if(S.screen==='lesson'){a.appendChild(lessonS());ov(a);return;}
  if(S.screen==='track'){a.appendChild(trackS());ov(a);return;}
  if(S.screen==='admin'){a.appendChild(adminS());ov(a);return;}
  const w=e('div',{style:'min-height:100vh'});
  if(S.tab==='home')w.appendChild(homeT());
  else if(S.tab==='lb')w.appendChild(lbT());
  else if(S.tab==='ai')w.appendChild(aiT());
  else if(S.tab==='profile')w.appendChild(profileT());
  w.appendChild(nav());ov(w);a.appendChild(w);
}
function ov(p){
  if(S.xpPop)p.appendChild(e('div',{style:'position:fixed;top:50%;left:50%;z-index:999;pointer-events:none;animation:xpPop 1.6s ease-out forwards;font-size:44px;font-weight:900;color:var(--gold);text-shadow:0 0 30px var(--gold);transform:translate(-50%,-50%)'},'+'+S.xpAmt+' XP ✨'));
  if(S.notif)p.appendChild(e('div',{style:'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:11px 22px;border-radius:50px;font-weight:700;font-size:13px;z-index:998;animation:notif 2.8s ease forwards;white-space:nowrap;'},S.notif));
  if(S.modal)p.appendChild(S.modal());
}

function e(tag,at={},...kids){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(at)){
    if(k==='style')el.style.cssText+=v;
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for(const k of kids.flat()){if(k==null)continue;el.appendChild(typeof k==='object'?k:document.createTextNode(String(k)));}
  return el;
}
function d(s,...k){return e('div',{style:s},...k);}
function sp(s,...k){return e('span',{style:s},...k);}
function pb(val,max,color,h=8){
  const pct=Math.min(100,(val/Math.max(max,1))*100);
  const w=e('div',{class:'pb',style:'height:'+h+'px'});
  w.appendChild(e('div',{class:'pbf',style:'width:'+pct+'%;background:linear-gradient(90deg,'+color+','+color+'cc);height:100%'}));
  return w;
}
function hts(n){
  const d2=d('display:flex;gap:4px');
  for(let i=0;i<5;i++)d2.appendChild(sp('font-size:18px;opacity:'+(i<n?1:.2),'❤️'));
  return d2;
}
function ntf(msg){
  if(S.nTimer)clearTimeout(S.nTimer);
  S.notif=msg;rr();
  S.nTimer=setTimeout(()=>{S.notif=null;rr();},2800);
}
function xp(amt){S.xpPop=true;S.xpAmt=amt;rr();setTimeout(()=>{S.xpPop=false;rr();},1600);}

function authS(){
  let isL=true;
  const wrap=d('min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at top,#1A1040,var(--ink))');

  const t=d('font-size:36px;font-weight:900;color:#fff;letter-spacing:-1px;margin-top:8px');
  t.innerHTML='Academ<span style="color:var(--accent)">IQ</span>';
  logo.appendChild(t);
  logo.appendChild(d('color:var(--muted);font-size:13px;margin-top:4px','تعلّم الإنجليزية الأكاديمية'));
  const box=e('div',{class:'card',style:'width:100%;max-width:420px'});
  const tabs=d('display:flex;gap:4px;margin-bottom:24px;background:var(--ink);border-radius:12px;padding:4px');
  const lt=e('div',{style:'flex:1;text-align:center;padding:10px;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;background:var(--accent);color:#fff'},'تسجيل الدخول');
  const rt=e('div',{style:'flex:1;text-align:center;padding:10px;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;color:var(--muted)'},'حساب جديد');
  function sw(l){isL=l;if(l){lt.style.background='var(--accent)';lt.style.color='#fff';rt.style.background='none';rt.style.color='var(--muted)';}else{rt.style.background='var(--accent)';rt.style.color='#fff';lt.style.background='none';lt.style.color='var(--muted)';}rf();}
  lt.onclick=()=>sw(true);rt.onclick=()=>sw(false);tabs.append(lt,rt);
  const fw=d('');
  function rf(){
    fw.innerHTML='';
    const ei=e('input',{class:'inp',type:'email',placeholder:'البريد الإلكتروني'});
    const pi=e('input',{class:'inp',type:'password',placeholder:'كلمة المرور',style:'margin-top:12px'});
    const ni=e('input',{class:'inp',type:'text',placeholder:'اسمك الكامل',style:'margin-bottom:12px'});
    const err=d('color:var(--rose);font-size:13px;min-height:18px;margin-top:8px;text-align:center','');
    if(!isL)fw.appendChild(ni);
    fw.appendChild(ei);fw.appendChild(pi);fw.appendChild(err);fw.appendChild(d('height:16px'));
    const sb2=e('button',{class:'btn btn-p btn-f'},isL?'دخول ›':'إنشاء حساب ›');
    sb2.onclick=async()=>{
      err.textContent='';
      const em=ei.value.trim(),pw=pi.value.trim(),nm=ni.value.trim();
      if(!em||!pw){err.textContent='أدخل البريد وكلمة المرور';return;}
      sb2.disabled=true;sb2.innerHTML='<div class="sp"></div>';
      if(isL){
        const{error}=await sb.auth.signInWithPassword({email:em,password:pw});
        if(error){err.textContent='بيانات خاطئة';sb2.disabled=false;sb2.textContent='دخول ›';}
      }else{
        if(!nm){err.textContent='أدخل اسمك';sb2.disabled=false;sb2.textContent='إنشاء حساب ›';return;}
        const{error}=await sb.auth.signUp({email:em,password:pw,options:{data:{name:nm}}});
        if(error){err.textContent=error.message;sb2.disabled=false;sb2.textContent='إنشاء حساب ›';}
        else{err.style.color='var(--green)';err.textContent='✅ تم! سجل دخول الآن';sb2.disabled=false;sb2.textContent='إنشاء حساب ›';sw(true);}
      }
    };
    fw.appendChild(sb2);
  }
  rf();box.append(tabs,fw);wrap.append(logo,box);return wrap;
}

// ══ NAV ══

  const n=e('div',{id:'nav'});
  [['home','🏠','الرئيسية'],['lb','🏆','المتصدرون'],['ai','🤖','Dr. IQ'],['profile','👤','ملفي']].forEach(([id,ic,lb])=>{
    const it=e('button',{class:'ni'+(S.tab===id?' ac':'')},sp('',ic),sp('',lb));
    it.onclick=()=>{S.tab=id;rend('main');};n.appendChild(it);
  });
  return n;
}

  // Level

  lt.append(ll,d('background:var(--accent);color:#fff;font-weight:800;border-radius:8px;padding:6px 14px;font-size:13px',xpv.toLocaleString()+' XP'));lc.appendChild(lt);
  if(nl){lc.appendChild(pb(xpv-cl.xp,nl.xp-cl.xp,'#6C63FF',10));const s=d('display:flex;justify-content:space-between;margin-top:6px');s.appendChild(d('color:var(--muted);font-size:11px',cl.id));s.appendChild(d('color:var(--muted);font-size:11px',(nl.xp-xpv).toLocaleString()+' XP to '+nl.id));lc.appendChild(s);}
  // Daily

  dd.appendChild(d('color:#fff;font-size:16px;font-weight:700;margin:20px 0 12px','👑 إضافة أدمن'));
  const ar=d('display:flex;gap:8px');
  const ae=e('input',{class:'inp',placeholder:'إيميل المستخدم',style:'flex:1'});
  const aab=e('button',{class:'btn btn-g',style:'padding:12px 16px;font-size:13px;flex-shrink:0'},'إضافة');
  aab.onclick=async()=>{
    if(!ae.value)return;
    const{data}=await sb.from('profiles').select('id').eq('email',ae.value.trim()).single();
    if(!data){ntf('❌ المستخدم غير موجود');return;}
    await sb.from('profiles').update({is_admin:true}).eq('id',data.id);ntf('✅ '+ae.value+' أصبح أدمن');ae.value='';
  };
  ar.append(ae,aab);dd.appendChild(ar);return dd;
}

init();
</script>
</body>
</html>
