<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --ink:#0A0A0F;--surface:#12121A;--panel:#1A1A26;--border:#2A2A3E;
  --accent:#6C63FF;--gold:#FFD166;--green:#06D6A0;--rose:#EF476F;
  --text:#E8E8F0;--muted:#7070A0;
}
body{background:var(--ink);font-family:'Outfit',sans-serif;color:var(--text);min-height:100vh;display:flex;justify-content:center;}
#root{width:100%;max-width:480px;min-height:100vh;position:relative;overflow-x:hidden;}
*::-webkit-scrollbar{display:none;}
input,textarea,select{font-family:'Outfit',sans-serif;outline:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes splash{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes xpPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}30%{opacity:1;transform:translate(-50%,-65%) scale(1.3)}80%{opacity:1;transform:translate(-50%,-80%) scale(1)}100%{opacity:0;transform:translate(-50%,-100%) scale(.8)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes slideIn{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes notif{0%{opacity:0;transform:translateX(-50%) translateY(20px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-10px)}}
.screen{padding:20px 16px 100px;animation:fadeUp .3s ease;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:20px;}
.btn{border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-weight:700;border-radius:14px;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;font-size:15px;}
.btn:active{transform:scale(.96);}
.btn-primary{background:linear-gradient(135deg,var(--accent),#8B85FF);color:#fff;box-shadow:0 4px 20px #6C63FF33;}
.btn-gold{background:linear-gradient(135deg,var(--gold),#FFA500);color:#000;}
.btn-green{background:linear-gradient(135deg,var(--green),#00B894);color:#000;}
.btn-ghost{background:var(--panel);color:var(--text);border:1px solid var(--border);}
.btn-danger{background:var(--rose);color:#fff;}
.btn-full{width:100%;}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;}
.input{background:var(--panel);border:1.5px solid var(--border);border-radius:12px;padding:13px 16px;color:var(--text);font-size:15px;width:100%;transition:border .2s;}
.input:focus{border-color:var(--accent);}
.input::placeholder{color:var(--muted);}
.label{color:var(--muted);font-size:12px;font-weight:600;margin-bottom:6px;display:block;}
.pb-wrap{background:var(--border);border-radius:99px;overflow:hidden;}
.pb-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.34,1.56,.64,1);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.bubble-ai{background:var(--panel);border:1px solid var(--border);border-radius:18px 18px 18px 4px;padding:12px 16px;max-width:82%;font-size:14px;line-height:1.65;white-space:pre-wrap;}
.bubble-user{background:linear-gradient(135deg,var(--accent),#8B85FF);border-radius:18px 18px 4px 18px;padding:12px 16px;max-width:82%;font-size:14px;line-height:1.65;color:#fff;}
.option-row{background:var(--panel);border:2px solid var(--border);border-radius:14px;padding:15px 18px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .2s;margin-bottom:10px;font-weight:600;font-size:15px;}
.admin-tab{padding:8px 14px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border:none;background:none;transition:all .2s;}
.admin-tab.active{background:var(--accent);color:#fff;}
.lesson-item{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.modal-overlay{position:fixed;inset:0;background:#000c;z-index:500;display:flex;align-items:flex-end;justify-content:center;}
.modal-box{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:24px;max-height:88vh;overflow-y:auto;animation:slideIn .3s ease;}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 16px;z-index:100;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:6px 12px;border-radius:12px;transition:all .2s;border:none;background:none;}
.nav-item.active{background:#6C63FF22;}
.nav-item span:first-child{font-size:22px;}
.nav-item span:last-child{font-size:10px;font-weight:600;color:var(--muted);}
.nav-item.active span:last-child{color:var(--accent);}
.word-card{background:var(--panel);border:2px solid var(--border);border-radius:24px;min-height:240px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:28px;text-align:center;transition:all .35s;margin-bottom:20px;}
.spinner{width:20px;height:20px;border:2px solid #fff4;border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
#splash{position:fixed;inset:0;background:radial-gradient(ellipse at center,#1A1040 0%,var(--ink) 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;}
</style>
</head>
<body>
<div id="root">
  <div id="splash">
    <div style="font-size:80px;animation:splash .6s cubic-bezier(.34,1.56,.64,1);filter:drop-shadow(0 0 30px #6C63FF)">🎓</div>
    <div style="font-size:40px;font-weight:900;color:#fff;margin-top:12px;letter-spacing:-1px">Academ<span style="color:var(--accent)">IQ</span></div>

    </div>

</div>
<script>
const SUPA_URL='https://zyreheuyrsfypnozyhkl.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5cmVoZXV5cnNmeXBub3p5aGtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMjc3MjIsImV4cCI6MjA4OTcwMzcyMn0.sN_bVNAzoDh2hujI1pQyil1ahagk9oIuGXCvn7eOZJw';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

let S={
  user:null,profile:null,screen:'home',tab:'home',
  tracks:[],lessons:{},aiSettings:{},
  activeTrack:null,activeLesson:null,progress:new Set(),
  selOpt:null,showRes:false,wordIdx:0,wordFlipped:false,
  fillAns:null,fillDone:false,simSel:null,
  aiMsgs:[{role:'ai',text:'مرحباً! أنا Dr. IQ 🎓\nاسألني عن أي مصطلح في إدارة الأعمال أو الاقتصاد أو العلوم السياسية!'}],
  aiLoading:false,aiModel:'claude',
  adminTab:'dashboard',adminAiInput:'',adminAiLoading:false,adminAiResponse:'',
  adminLessons:[],
  xpPop:false,xpAmt:0,notif:null,notifTimer:null,modal:null,
};

// ── INIT ──
async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(session?.user) await loginSuccess(session.user);
  else setTimeout(()=>{hideSplash();render('auth');},2000);
  sb.auth.onAuthStateChange(async(e,session)=>{
    if(e==='SIGNED_IN'&&session?.user&&!S.user) await loginSuccess(session.user);
  });
}
async function loginSuccess(user){
  S.user=user;
  S.profile=await loadProfile(user.id);
  if(!S.profile){setTimeout(()=>init(),1500);return;}
  S.tracks=await loadTracks();
  S.progress=await loadProgress(user.id);
  S.aiSettings=await loadAiSettings();
  S.aiModel=S.aiSettings?.active_model||'claude';
  hideSplash();render('main');
}
function hideSplash(){
  document.getElementById('splash').style.display='none';
  document.getElementById('app').style.display='block';
}

// ── DB ──
async function loadProfile(uid){const{data}=await sb.from('profiles').select('*').eq('id',uid).single();return data;}
async function loadTracks(){const{data}=await sb.from('tracks').select('*').eq('is_active',true).order('order_num');return data||[];}
async function loadLessons(tid){const{data}=await sb.from('lessons').select('*').eq('track_id',tid).eq('is_active',true).order('order_num');return data||[];}
async function loadProgress(uid){const{data}=await sb.from('user_progress').select('lesson_id').eq('user_id',uid);return new Set((data||[]).map(r=>r.lesson_id));}
async function saveProgress(uid,lid,score){await sb.from('user_progress').upsert({user_id:uid,lesson_id:lid,score});}
async function updateProfile(uid,updates){await sb.from('profiles').update(updates).eq('id',uid);}
async function loadAiSettings(){const{data}=await sb.from('ai_settings').select('*').eq('id',1).single();return data||{};}
async function saveAiSettings(u){await sb.from('ai_settings').update({...u,updated_at:new Date().toISOString()}).eq('id',1);}
async function logChange(aid,action,desc,model){await sb.from('change_log').insert({admin_id:aid,action,description:desc,ai_model:model});}

// ── NOTIFY ──
function notify(msg){
  if(S.notifTimer)clearTimeout(S.notifTimer);
  S.notif=msg;rerender();
  S.notifTimer=setTimeout(()=>{S.notif=null;rerender();},2800);
}
function showXP(amt){S.xpPop=true;S.xpAmt=amt;rerender();setTimeout(()=>{S.xpPop=false;rerender();},1600);}

// ── AI ──
async function callAI(prompt,sys,model){
  const m=model||S.aiModel,set=S.aiSettings;
  if(m==='claude'){
    const key=set.claude_key;
    if(!key)return'⚠️ Claude Key غير موجود — أضفه من الإعدادات';
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,system:sys||'أنت مدرس ذكي.',messages:[{role:'user',content:prompt}]})});
    const d=await r.json();return d.content?.[0]?.text||'لا يوجد رد.';
  }
  if(m==='gemini'){
    const key=set.gemini_key;
    if(!key)return'⚠️ Gemini Key غير موجود';
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:(sys?sys+'\n\n':'')+prompt}]}]})});
    const d=await r.json();return d.candidates?.[0]?.content?.parts?.[0]?.text||'لا يوجد رد.';
  }
  if(m==='openai'){
    const key=set.openai_key;
    if(!key)return'⚠️ OpenAI Key غير موجود';
    const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'gpt-4o-mini',max_tokens:1500,messages:[{role:'system',content:sys||'أنت مدرس ذكي.'},{role:'user',content:prompt}]})});
    const d=await r.json();return d.choices?.[0]?.message?.content||'لا يوجد رد.';
  }
  if(m==='grok'){
    const key=set.grok_key;
    if(!key)return'⚠️ Grok Key غير موجود';
    const r=await fetch('https://api.x.ai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'grok-beta',max_tokens:1500,messages:[{role:'system',content:sys||'أنت مدرس ذكي.'},{role:'user',content:prompt}]})});
    const d=await r.json();return d.choices?.[0]?.message?.content||'لا يوجد رد.';
  }
  return'نموذج غير معروف.';
}

// ── RENDER ──
function render(screen){S.screen=screen;rerender();}
function rerender(){
  const app=document.getElementById('app');
  if(!app)return;
  app.innerHTML='';
  if(S.screen==='auth'){app.appendChild(authScreen());return;}
  if(S.screen==='lesson'){app.appendChild(lessonScreen());overlays(app);return;}
  if(S.screen==='track'){app.appendChild(trackScreen());overlays(app);return;}
  if(S.screen==='admin'){app.appendChild(adminScreen());overlays(app);return;}
  const w=el('div',{style:'min-height:100vh'});
  if(S.tab==='home')w.appendChild(homeTab());
  else if(S.tab==='leaderboard')w.appendChild(leaderboardTab());
  else if(S.tab==='ai')w.appendChild(aiTab());
  else if(S.tab==='profile')w.appendChild(profileTab());
  w.appendChild(bottomNav());
  overlays(w);
  app.appendChild(w);
}
function overlays(p){
  if(S.xpPop)p.appendChild(el('div',{style:'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:999;pointer-events:none;animation:xpPop 1.6s ease-out forwards;font-size:44px;font-weight:900;color:var(--gold);text-shadow:0 0 30px var(--gold)'},`+${S.xpAmt} XP ✨`));
  if(S.notif)p.appendChild(el('div',{style:'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:11px 22px;border-radius:50px;font-weight:700;font-size:13px;z-index:998;animation:notif 2.8s ease forwards;white-space:nowrap;'},S.notif));
  if(S.modal)p.appendChild(S.modal());
}

// ── DOM ──
function el(tag,attrs={},...kids){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==='style')e.style.cssText+=v;
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(const k of kids.flat(Infinity)){
    if(k==null||k===false)continue;
    e.appendChild(typeof k==='object'?k:document.createTextNode(String(k)));
  }
  return e;
}
function div(s,...k){return el('div',{style:s},...k);}
function span(s,...k){return el('span',{style:s},...k);}
function progressBar(val,max,color,h=8){
  const pct=Math.min(100,(val/Math.max(max,1))*100);
  const w=el('div',{class:'pb-wrap',style:`height:${h}px`});
  w.appendChild(el('div',{class:'pb-fill',style:`width:${pct}%;background:linear-gradient(90deg,${color},${color}cc);height:100%;box-shadow:0 0 8px ${color}55`}));
  return w;
}
function heartsEl(count){
  const d=div('display:flex;gap:4px');
  for(let i=0;i<5;i++)d.appendChild(span(`font-size:18px;opacity:${i<count?1:.2}`,`❤️`));
  return d;
}

// ── AUTH ──
function authScreen(){
  let isLogin=true;
  const wrap=div('min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at top,#1A1040,var(--ink))');
  const logo=div('text-align:center;margin-bottom:36px');
  logo.appendChild(div('font-size:64px;filter:drop-shadow(0 0 20px #6C63FF)','🎓'));
  const t=div('font-size:36px;font-weight:900;color:#fff;letter-spacing:-1px;margin-top:8px');
  t.innerHTML='Academ<span style="color:var(--accent)">IQ</span>';
  logo.appendChild(t);
  logo.appendChild(div('color:var(--muted);font-size:13px;margin-top:4px','تعلّم الإنجليزية الأكاديمية'));
  const box=el('div',{class:'card',style:'width:100%;max-width:420px'});
  const tabs=div('display:flex;gap:4px;margin-bottom:24px;background:var(--ink);border-radius:12px;padding:4px');
  const lt=el('div',{style:'flex:1;text-align:center;padding:10px;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s;background:var(--accent);color:#fff'},'تسجيل الدخول');
  const rt=el('div',{style:'flex:1;text-align:center;padding:10px;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s;color:var(--muted)'},'حساب جديد');
  function sw(login){
    isLogin=login;
    if(login){lt.style.background='var(--accent)';lt.style.color='#fff';rt.style.background='none';rt.style.color='var(--muted)';}
    else{rt.style.background='var(--accent)';rt.style.color='#fff';lt.style.background='none';lt.style.color='var(--muted)';}
    rf();
  }
  lt.onclick=()=>sw(true);rt.onclick=()=>sw(false);
  tabs.append(lt,rt);
  const fw=div('');
  function rf(){
    fw.innerHTML='';
    const ei=el('input',{class:'input',type:'email',placeholder:'البريد الإلكتروني'});
    const pi=el('input',{class:'input',type:'password',placeholder:'كلمة المرور',style:'margin-top:12px'});
    const ni=el('input',{class:'input',type:'text',placeholder:'اسمك الكامل',style:'margin-bottom:12px'});
    const err=div('color:var(--rose);font-size:13px;min-height:18px;margin-top:8px;text-align:center','');
    if(!isLogin){fw.appendChild(ni);}
    fw.appendChild(ei);fw.appendChild(pi);fw.appendChild(err);
    fw.appendChild(div('height:16px'));
    const sb2=el('button',{class:'btn btn-primary btn-full'},isLogin?'دخول ›':'إنشاء حساب ›');
    sb2.onclick=async()=>{
      err.textContent='';
      const email=ei.value.trim(),pass=pi.value.trim(),name=ni.value.trim();
      if(!email||!pass){err.textContent='أدخل البريد وكلمة المرور';return;}
      sb2.disabled=true;sb2.innerHTML='<div class="spinner"></div>';
      if(isLogin){
        const{error}=await sb.auth.signInWithPassword({email,password:pass});
        if(error){err.textContent='بيانات خاطئة';sb2.disabled=false;sb2.textContent='دخول ›';}
      }else{
        if(!name){err.textContent='أدخل اسمك';sb2.disabled=false;sb2.textContent='إنشاء حساب ›';return;}
        const{error}=await sb.auth.signUp({email,password:pass,options:{data:{name}}});
        if(error){err.textContent=error.message;sb2.disabled=false;sb2.textContent='إنشاء حساب ›';}
        else{err.style.color='var(--green)';err.textContent='✅ تم! تحقق من بريدك';sb2.disabled=false;sb2.textContent='إنشاء حساب ›';}
      }
    };
    fw.appendChild(sb2);
  }
  rf();
  box.append(tabs,fw);
  wrap.append(logo,box);
  return wrap;
}

// ── NAV ──
function bottomNav(){
  const nav=el('div',{id:'nav'});
  [['home','🏠','الرئيسية'],['leaderboard','🏆','المتصدرون'],['ai','🤖','Dr. IQ'],['profile','👤','ملفي']].forEach(([id,ic,lbl])=>{
    const it=el('button',{class:`nav-item${S.tab===id?' active':''}`},span('',ic),span('',lbl));
    it.onclick=()=>{S.tab=id;render('main');};
    nav.appendChild(it);
  });
  return nav;
}

// ── HOME ──
function homeTab(){
  const p=S.profile||{};
  const d=el('div',{class:'screen'});
  const LEVELS=[{id:'A1',ar:'مبتدئ',xp:0},{id:'A2',ar:'أساسي',xp:500},{id:'B1',ar:'متوسط',xp:1500},{id:'B2',ar:'فوق المتوسط',xp:3000},{id:'C1',ar:'متقدم',xp:6000},{id:'C2',ar:'إتقان',xp:10000}];
  const xp=p.xp||0;
  const cl=LEVELS.filter(l=>xp>=l.xp).pop()||LEVELS[0];
  const nl=LEVELS[LEVELS.indexOf(cl)+1];

  // Header
  const hdr=div('display:flex;justify-content:space-between;align-items:center;margin-bottom:24px');
  const hl=div('');
  hl.appendChild(div('color:var(--muted);font-size:12px','أهلاً بك 👋'));
  hl.appendChild(div('color:#fff;font-size:22px;font-weight:800',p.name||''));
  const hr=div('display:flex;gap:12px;align-items:center');
  [[`🔥`,p.streak||0,'var(--gold)'],[`⚡`,xp.toLocaleString(),'var(--accent)'],[`❤️`,`${p.hearts||5}/5`,'var(--rose)']].forEach(([ic,val,clr])=>{
    const it=div('text-align:center');
    it.appendChild(div(`font-size:20px;filter:drop-shadow(0 0 4px ${clr})`,ic));
    it.appendChild(div(`color:${clr};font-size:13px;font-weight:800`,String(val)));
    hr.appendChild(it);
  });
  if(p.is_admin){const ab=el('button',{class:'btn btn-primary',style:'padding:8px 12px;font-size:12px'},'⚙️ Admin');ab.onclick=()=>render('admin');hr.appendChild(ab);}
  hdr.append(hl,hr);

  // Level card
  const lc=el('div',{style:'background:linear-gradient(135deg,#1E1840,#2A1F5E);border:1px solid #6C63FF44;border-radius:20px;padding:20px;margin-bottom:20px'});
  const lt=div('display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px');

function resetLesson(){S.selOpt=null;S.showRes=false;S.wordIdx=0;S.wordFlipped=false;S.fillAns=null;S.fillDone=false;S.simSel=null;}
function lessonHdr(step,max,tc){
  const w=div('display:flex;align-items:center;gap:12px;margin-bottom:24px');

}
async function finishLesson(){
  const l=S.activeLesson,earned=l.xp_reward||20;
  S.profile.xp=(S.profile.xp||0)+earned;
  await updateProfile(S.user.id,{xp:S.profile.xp});
  await saveProgress(S.user.id,l.id,100);
  S.progress.add(l.id);showXP(earned);notify(`🎉 أحسنت! +${earned} XP`);render('track');
}
function lessonScreen(){
  const l=S.activeLesson,tc=S.activeTrack?.color||'var(--accent)',c=l.content||{};

function vocabLesson(l,c,tc){

function mcqLesson(l,c,tc){

        if(!tf.value){notify('أدخل العنوان');return;}
        sn.disabled=true;sn.innerHTML='<div class="spinner"></div>';
        const{data,error}=await sb.from('lessons').insert({track_id:trf.value,title:tf.value,title_ar:taf.value,level:lvf.value,type:tyf.value,content:parsed,xp_reward:25,order_num:Date.now()}).select().single();
        if(error){notify('❌ خطأ: '+error.message);sn.disabled=false;sn.textContent='💾 حفظ';return;}
        S.adminLessons.unshift(data);await logChange(S.user.id,'ai_lesson',tf.value,S.aiModel);
        notify('🎉 تم حفظ الدرس!');S.adminAiResponse='';rerender();
      };
      ss.append(tf,taf,trf,lvf,tyf,sn);d.appendChild(ss);
    }catch(e){d.appendChild(div('color:var(--muted);font-size:12px','⚠️ الرد ليس JSON صالح'));}
  }
  return d;
}

function adminSettings(){
  const s=S.aiSettings||{};
  const d=div('');
  d.appendChild(div('color:#fff;font-size:18px;font-weight:800;margin-bottom:20px','⚙️ الإعدادات'));
  d.appendChild(div('color:var(--muted);font-size:12px;font-weight:600;margin-bottom:10px','النموذج الافتراضي'));
  const mc={claude:'var(--accent)',gemini:'var(--green)',openai:'#10A37F',grok:'#1DA1F2'};
  const mr=div('display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px');
  Object.keys(mc).forEach(m=>{
    const active=(s.active_model||'claude')===m;
    const mb=el('button',{style:`padding:10px 16px;border-radius:10px;border:2px solid ${active?mc[m]:'var(--border)'};background:${active?mc[m]+'22':'transparent'};color:${active?mc[m]:'var(--muted)'};font-size:13px;font-weight:700;cursor:pointer`},{claude:'Claude',gemini:'Gemini',openai:'ChatGPT',grok:'Grok'}[m]);
    mb.onclick=async()=>{await saveAiSettings({active_model:m});S.aiSettings.active_model=m;S.aiModel=m;notify(`✅ النموذج: ${m}`);rerender();};
    mr.appendChild(mb);
  });
  d.appendChild(mr);
  d.appendChild(div('color:#fff;font-size:16px;font-weight:700;margin-bottom:14px','🔑 مفاتيح API'));
  [{label:'Claude',key:'claude_key',ph:'sk-ant-...'},{label:'Gemini',key:'gemini_key',ph:'AIza...'},{label:'ChatGPT (OpenAI)',key:'openai_key',ph:'sk-...'},{label:'Grok (xAI)',key:'grok_key',ph:'xai-...'}].forEach(({label,key,ph})=>{
    d.appendChild(el('label',{class:'label'},label));
    const row=div('display:flex;gap:8px;margin-bottom:14px');
    const inp=el('input',{class:'input',type:'password',placeholder:ph,style:'flex:1'});inp.value=s[key]||'';
    const sv=el('button',{class:'btn btn-primary',style:'padding:12px 16px;font-size:13px;flex-shrink:0'},'حفظ');
    sv.onclick=async()=>{await saveAiSettings({[key]:inp.value.trim()});S.aiSettings[key]=inp.value.trim();notify(`✅ تم حفظ مفتاح ${label}`);};
    row.append(inp,sv);d.appendChild(row);
  });
  d.appendChild(div('color:#fff;font-size:16px;font-weight:700;margin:8px 0 12px','📝 System Prompt'));
  const sta=el('textarea',{class:'input',placeholder:'أنت مدرس ذكي...',style:'height:110px;resize:none;direction:rtl;margin-bottom:12px'});
  sta.value=s.system_prompt||'';
  const ssp=el('button',{class:'btn btn-green btn-full'},'💾 حفظ الـ Prompt');
  ssp.onclick=async()=>{await saveAiSettings({system_prompt:sta.value});S.aiSettings.system_prompt=sta.value;notify('✅ تم الحفظ');};
  d.append(sta,ssp);
  d.appendChild(div('color:#fff;font-size:16px;font-weight:700;margin:20px 0 12px','👑 إضافة أدمن'));
  const ar=div('display:flex;gap:8px');
  const ae=el('input',{class:'input',placeholder:'إيميل المستخدم',style:'flex:1'});
  const aab=el('button',{class:'btn btn-gold',style:'padding:12px 16px;font-size:13px;flex-shrink:0;white-space:nowrap'},'إضافة');
  aab.onclick=async()=>{
    if(!ae.value)return;
    const{data}=await sb.from('profiles').select('id').eq('email',ae.value.trim()).single();
    if(!data){notify('❌ المستخدم غير موجود');return;}
    await sb.from('profiles').update({is_admin:true}).eq('id',data.id);
    notify(`✅ تم! ${ae.value} أصبح أدمن`);ae.value='';
  };
  ar.append(ae,aab);d.appendChild(ar);
  return d;
}

init();
</script>
